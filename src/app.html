<!doctype html>
<html
  lang="en"
  translate="no">
  <head>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      let savedConsent = null;
      try {
        const stored = localStorage.getItem('fkp_cookie_consent_v2');
        if (stored) savedConsent = JSON.parse(stored);
      } catch (e) {}

      const defaultConsent = {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500,
      };

      if (savedConsent) {
        defaultConsent.analytics_storage = savedConsent.analytics_storage || 'denied';
        defaultConsent.ad_storage = savedConsent.ad_storage || 'denied';
        defaultConsent.ad_user_data = savedConsent.ad_user_data || 'denied';
        defaultConsent.ad_personalization = savedConsent.ad_personalization || 'denied';
      }

      gtag('consent', 'default', defaultConsent);
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', true);
    </script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-6HR3DKWZLF"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-6HR3DKWZLF');
    </script>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      content="#09090b" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png" />
    <link
      rel="icon"
      href="/favicon.ico" />
    <link
      rel="manifest"
      href="/site.webmanifest" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link
      rel="alternate"
      type="application/atom+xml"
      title="fkp.my.id — Blog Feed"
      href="/atom.xml" />
    %sveltekit.head%
  </head>
  <body class="min-h-screen">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
